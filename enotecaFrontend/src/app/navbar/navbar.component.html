<nav class="navbar">
  <div class="logo-area" (click)="goHome()" role="button" aria-label="Torna alla home">

    <!-- Immagine del logo -->
    <div class="logo-icon">
      <img src="assets/LogoCantina.png" alt="LogoCantina" class="logo-img">
    </div>
  </div>

  <div class="navbar-actions">

    <!-- Home -->
    <button class="btn-home" (click)="goHome()">
      <i class="ti ti-home" aria-hidden="true"></i>
      Home
    </button>

    <!-- Gestione enoteca -->
    <button class="btn-add" (click)="onManageWines()">
      <i class="ti ti-settings" aria-hidden="true"></i>
      Gestione enoteca (admin)
    </button>

    <!-- Logout (quando c'è login) -->
    <button class="btn-logout" *ngIf="isLoggedIn" (click)="logout()">
      <i class="ti ti-logout" aria-hidden="true"></i>
      Logout
    </button>

    <!-- Contattaci -->
    <button class="btn-contact" (click)="contactUS()">
      <i class="ti ti-mail" aria-hidden="true"></i>
      Contattaci
    </button>

  </div>
</nav>
