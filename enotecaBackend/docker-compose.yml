version: "3.9"

services:
  api:
    build: .
    container_name: enoteca_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app   # hot-reload in sviluppo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    container_name: enoteca_db
    environment:
      POSTGRES_DB: enoteca
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d enoteca"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: